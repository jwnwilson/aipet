apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aipet-server
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aipet-api-v2.jwnwilson.co.uk
      secretName: aipet-server-tls
  rules:
    - host: "aipet-api-v2.jwnwilson.co.uk"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aipet-server
                port:
                  number: 80
