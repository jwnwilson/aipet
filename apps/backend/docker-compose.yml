version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aipet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aipet_db
      POSTGRES_USER: aipet_user
      POSTGRES_PASSWORD: aipet_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - aipet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipet_user -d aipet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aipet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aipet.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - aipet-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  aipet-network:
    driver: bridge
